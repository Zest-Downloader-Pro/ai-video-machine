name: Make My Video
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Video Engines
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install moviepy==1.0.3 Pillow
      - name: Run Machine
        run: python main.py
      - name: Save Video
        uses: actions/upload-artifact@v4
        with:
          name: my-final-video
          path: final_video.mp4
          if-no-files-found: error
